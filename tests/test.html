<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Page</title>
</head>
<body>
  <!-- Missing alt attribute on img -->
  <img src="photo.jpg">

  <!-- Deprecated element -->
  <center>Hello World</center>

  <!-- Empty heading -->

  <!-- Button missing type -->

  <!-- Duplicate id -->

    body { color: red; }
  </style>

  <!-- heading-level: skipped heading level (h1 → h3) -->
  <h1>Title</h1>
  <h3>Subtitle</h3>
