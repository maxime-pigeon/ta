name: Teaching Assistant
description: Parses JSON linter output from stdin and posts inline review comments.
inputs:
  token:
    description: GitHub token
    required: true
    default: ${{ github.token }}
runs:
  using: docker
  image: Dockerfile
  env:
    GITHUB_TOKEN: ${{ inputs.token }}
    PR_NUMBER: ${{ github.event.pull_request.number }}
